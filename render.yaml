services:
  - type: web
    name: gabfoot-web
    runtime: python
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python web_app.py
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: GABFOOT_PUBLIC_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
